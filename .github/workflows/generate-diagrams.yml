name: Auto-Generate Professional UML

on:
  push:
    branches: [ main ]

jobs:
  uml-gen:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz plantuml python3-pip
          pip3 install hpp2plantuml

      - name: Prepare Output Directory
        run: mkdir -p docs/diagrams

      - name: Run Doxygen
        run: doxygen Doxyfile

      - name: Generate Master Class Diagram
        run: |
          # Use hpp2plantuml to create a valid UML file from all headers
          hpp2plantuml -i "**/*.hpp" -o docs/diagrams/classes.puml
          # Render it
          plantuml docs/diagrams/classes.puml -tpng
          mv docs/diagrams/classes.png docs/diagrams/project_class_diagram.png

      - name: Generate Master Sequence (Call) Diagram
        run: |
          # Doxygen generates individual call graphs in docs/xml or docs/latex.
          # We will use dot (from Graphviz) to combine discovered calls into one view.
          # For a single project-wide call graph, we target the main entry point logic.
          find docs -name "*_cgraph.dot" | xargs cat > docs/diagrams/combined_calls.dot || echo "No calls found"
          if [ -s docs/diagrams/combined_calls.dot ]; then
            dot -Tpng docs/diagrams/combined_calls.dot -o docs/diagrams/project_sequence_diagram.png
          else
            echo "Fallback: creating empty placeholder"
            touch docs/diagrams/project_sequence_diagram.png
          fi

      - name: Deploy Diagrams to Repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main --rebase
          git add docs/diagrams/*.png
          git commit -m "docs: generate professional architecture diagrams" || exit 0
          git push origin main