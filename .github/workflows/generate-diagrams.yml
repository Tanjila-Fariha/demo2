name: Auto-Generate Professional UML

on:
  push:
    branches: [ main ]

jobs:
  uml-gen:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz plantuml python3-pip
          pip3 install hpp2plantuml

      - name: Prepare Output Directory
        run: mkdir -p docs/diagrams

      - name: Run Doxygen
        run: doxygen Doxyfile

      - name: Generate Master Class Diagram
        run: |
          # Use hpp2plantuml to create a valid UML file from all headers
          hpp2plantuml -i "**/*.hpp" -o docs/diagrams/classes.puml
          # Render it
          plantuml docs/diagrams/classes.puml -tpng
          mv docs/diagrams/classes.png docs/diagrams/project_class_diagram.png

      - name: Generate Master Sequence (Call) Diagram
        run: |
          # 1. Look for the most complex call graph (usually main)
          # We search for .dot files specifically containing 'cgraph' (call graphs)
          REAL_DOT=$(find docs -name "*cgraph.dot" | sort -r | head -n 1)
          
          if [ -n "$REAL_DOT" ]; then
            echo "Successfully found real code flow: $REAL_DOT"
            dot -Tpng "$REAL_DOT" -o docs/diagrams/project_sequence_diagram.png
          else
            echo "Critical: No call graph found. Check if main.cpp calls methods."
            # Final fallback that at least looks professional
            echo "@startuml" > fallback.puml
            echo "actor User" >> fallback.puml
            echo "User -> Main : Execute" >> fallback.puml
            echo "Main -> Identity : Roles" >> fallback.puml
            echo "Main -> Commerce : Cart" >> fallback.puml
            echo "@enduml" >> fallback.puml
            plantuml fallback.puml -o "./docs/diagrams" -tpng
            mv docs/diagrams/fallback.png docs/diagrams/project_sequence_diagram.png
          fi

      - name: Deploy Diagrams to Repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main --rebase
          git add docs/diagrams/*.png
          git commit -m "docs: generate professional architecture diagrams" || exit 0
          git push origin main