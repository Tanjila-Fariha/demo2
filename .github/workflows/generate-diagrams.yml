name: Auto-Generate Professional UML

on:
  push:
    branches: [ main ]

jobs:
  uml-gen:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz plantuml python3-pip
          pip3 install hpp2plantuml

      - name: Run Doxygen
        run: doxygen Doxyfile

      - name: Generate Master Class Diagram
        run: |
          mkdir -p docs/diagrams
          hpp2plantuml -i "**/*.hpp" -o docs/diagrams/classes.puml
          plantuml docs/diagrams/classes.puml -tpng
          mv docs/diagrams/classes.png docs/diagrams/project_class_diagram.png || true

      - name: Capture Sequence Diagram
        run: |
          # Doxygen generates PNGs in the html_docs folder
          # We find the call graph for main() and move it
          mkdir -p docs/diagrams
          MAIN_GRAPH=$(find docs/html_docs -name "main_8cpp*cgraph.png" | head -n 1)
          
          if [ -n "$MAIN_GRAPH" ]; then
            cp "$MAIN_GRAPH" docs/diagrams/project_sequence_diagram.png
          else
            # If main isn't found, find the largest cgraph PNG available
            BIGGEST_GRAPH=$(find docs/html_docs -name "*cgraph.png" | xargs du -b | sort -nr | head -1 | cut -f2 || echo "")
            if [ -n "$BIGGEST_GRAPH" ]; then
              cp "$BIGGEST_GRAPH" docs/diagrams/project_sequence_diagram.png
            fi
          fi

      - name: Deploy Diagrams
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/diagrams/*.png
          git commit -m "docs: sync architecture diagrams" || exit 0
          git pull origin main --rebase
          git push origin main