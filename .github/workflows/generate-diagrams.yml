name: Auto-Generate Professional UML

on:
  push:
    branches: [ main ]

jobs:
  uml-gen:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz plantuml python3-pip
          pip3 install hpp2plantuml

      - name: Run Doxygen
        run: doxygen Doxyfile

      - name: Generate Master Class Diagram
        run: |
          mkdir -p docs/diagrams
          hpp2plantuml -i "**/*.hpp" -o docs/diagrams/classes.puml
          plantuml docs/diagrams/classes.puml -tpng
          mv docs/diagrams/classes.png docs/diagrams/project_class_diagram.png || true

      - name: Universal Sequence Automation with Returns
        run: |
          mkdir -p docs/diagrams
          # This Python script converts Doxygen XML into a professional vertical timeline
          python3 - <<EOF
          import os
          import xml.etree.ElementTree as ET

          xml_dir = 'docs/xml'
          puml = [
              "@startuml",
              "skinparam style strictuml",
              "skinparam sequenceMessageAlign center",
              "participant main"
          ]
          
          if os.path.exists(xml_dir):
              # 1. Find the main.cpp XML file produced by Doxygen
              for fn in os.listdir(xml_dir):
                  if 'main_8cpp' in fn and fn.endswith('.xml'):
                      tree = ET.parse(os.path.join(xml_dir, fn))
                      # 2. Trace all function calls made from inside 'main'
                      for member in tree.findall(".//memberdef"):
                          if member.find('name').text == 'main':
                              for ref in member.findall(".//references"):
                                  call = ref.text
                                  if '::' in call:
                                      obj, method = call.split('::', 1)
                                      # Add the call, activation bar, and return logic
                                      puml.append(f"main -> {obj} : {method}()")
                                      puml.append(f"activate {obj}")
                                      puml.append(f"{obj} --> main : return")
                                      puml.append(f"deactivate {obj}")
          
          puml.append("@enduml")
          with open("dynamic_seq.puml", "w") as f:
              f.write("\n".join(puml))
          EOF

          # Render the dynamic file using the PlantUML engine
          plantuml dynamic_seq.puml -tpng
          mv dynamic_seq.png docs/diagrams/project_sequence_diagram.png

      - name: Deploy Diagrams
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/diagrams/*.png
          git commit -m "docs: sync architecture diagrams" || exit 0
          git pull origin main --rebase
          git push origin main