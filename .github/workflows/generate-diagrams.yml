name: Auto-Generate Professional UML

on:
  push:
    branches: [ main ]

jobs:
  uml-gen:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz plantuml python3-pip
          pip3 install hpp2plantuml

      - name: Run Doxygen
        run: doxygen Doxyfile

      - name: Generate Master Class Diagram
        run: |
          mkdir -p docs/diagrams
          hpp2plantuml -i "**/*.hpp" -o docs/diagrams/classes.puml
          plantuml docs/diagrams/classes.puml -tpng
          mv docs/diagrams/classes.png docs/diagrams/project_class_diagram.png || true

      - name: Auto-Generate Sequence from Code Logic
      # This step automatically parses Doxygen's discovery into a Sequence timeline
        run: |
          mkdir -p docs/diagrams
          python3 - <<EOF
          import os
          import xml.etree.ElementTree as ET

          # Find the main function's XML file
          xml_dir = 'docs/xml'
          puml_content = ["@startuml", "skinparam style strictuml", "participant main"]
          
          # Look for call relationships in the XML
          for filename in os.listdir(xml_dir):
              if filename.startswith('main_8cpp') or filename.endswith('.xml'):
                  try:
                      tree = ET.parse(os.path.join(xml_dir, filename))
                      for member in tree.findall(".//memberdef"):
                          name = member.find('name').text
                          for call in member.findall(".//references"):
                              target = call.text
                              if name == 'main':
                                  puml_content.append(f"main -> {target.split('::')[0]} : {target}()")
                  except:
                      continue
          
          puml_content.append("@enduml")
          with open("auto_sequence.puml", "w") as f:
              f.write("\n".join(puml_content))
          EOF

          # Render the dynamic file
          plantuml auto_sequence.puml -tpng
          mv auto_sequence.png docs/diagrams/project_sequence_diagram.png

      - name: Deploy Diagrams
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/diagrams/*.png
          git commit -m "docs: sync architecture diagrams" || exit 0
          git pull origin main --rebase
          git push origin main