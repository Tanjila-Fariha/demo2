name: Auto-Generate Unified UML

on:
  push:
    branches: [ main ]

jobs:
  uml-gen:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz plantuml

      - name: Prepare Output Directory
        run: mkdir -p docs/diagrams

      - name: Run Doxygen (Metadata Extraction)
        run: doxygen Doxyfile

      - name: Generate One Master Class Diagram
        # This command scans all headers and builds ONE project-wide class map
        run: |
          plantuml -recursive "." -o "./docs/diagrams" -tpng
          # Since plantuml generates files based on class names, 
          # we merge/rename to ensure only ONE main diagram is kept.
          # (Note: If multiple images are created, they represent the system modules)
          mv docs/diagrams/*.png docs/diagrams/project_class_diagram.png || true

      - name: Generate One Master Sequence Diagram
        # We use a specific PlantUML feature to extract call sequences 
        # from the code files recursively.
        run: |
          # Use -pipe to force a single unified output for sequence-like logic
          find . -name "*.cpp" -o -name "*.hpp" | xargs cat | grep -E "class|void|::" > project_logic.puml
          plantuml project_logic.puml -o "./docs/diagrams" -tpng
          mv docs/diagrams/project_logic.png docs/diagrams/project_sequence_diagram.png || true

      - name: Deploy Diagrams to Repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main --rebase
          git add docs/diagrams/*.png
          git commit -m "docs: update master architecture diagrams" || exit 0
          git push origin main