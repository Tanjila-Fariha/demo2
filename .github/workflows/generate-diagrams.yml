name: Auto-Generate Professional UML

on:
  push:
    branches: [ main ]

jobs:
  uml-gen:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz plantuml python3-pip
          pip3 install hpp2plantuml

      - name: Prepare Output Directory
        run: mkdir -p docs/diagrams

      - name: Run Doxygen
        run: doxygen Doxyfile

      - name: Generate Master Class Diagram
        run: |
          # hpp2plantuml finds all headers and creates a valid .puml file with arrows
          hpp2plantuml -i "**/*.hpp" -o docs/diagrams/classes.puml
          # Render the .puml to .png
          plantuml docs/diagrams/classes.puml -tpng
          mv docs/diagrams/classes.png docs/diagrams/project_class_diagram.png

      - name: Generate Master Sequence Diagram
        run: |
          # We use a combined approach to capture the logic flow
          echo "@startuml" > docs/diagrams/sequence.puml
          echo "skinparam participantpadding 20" >> docs/diagrams/sequence.puml
          # Extracting method signatures and calls
          grep -rE "void [a-zA-Z0-9_]+::[a-zA-Z0-9_]+\(.*\)" . --include="*.cpp" >> docs/diagrams/sequence.puml
          echo "@enduml" >> docs/diagrams/sequence.puml
          
          plantuml docs/diagrams/sequence.puml -tpng
          mv docs/diagrams/sequence.png docs/diagrams/project_sequence_diagram.png || true

      - name: Deploy Diagrams to Repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main --rebase
          git add docs/diagrams/*.png
          git commit -m "docs: generate professional architecture diagrams" || exit 0
          git push origin main